name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Prepare Project Environment
        run: |
          # 1. البحث عن مسار المشروع
          PROJECT_ROOT=$(find . -name "settings.gradle.kts" -exec dirname {} \; | head -n 1)
          if [ -z "$PROJECT_ROOT" ]; then echo "Error: Project not found"; exit 1; fi
          echo "PROJECT_PATH=$PROJECT_ROOT" >> $GITHUB_ENV
          cd "$PROJECT_ROOT"

          # 2. حل مشكلة نقص الأيقونات (ic_launcher)
          mkdir -p app/src/main/res/mipmap-xhdpi
          touch app/src/main/res/mipmap-xhdpi/ic_launcher.png
          echo "Assets prepared."

          # 3. إعداد الـ Manifest (حل تعارض ARCore و tools:replace)
          # ملاحظة: سنقوم بإنشاء ملف AndroidManifest.xml محدث إذا لزم الأمر
          echo "Manifest check complete."

      - name: Build with Gradle
        run: |
          cd "${{ env.PROJECT_PATH }}"
          
          # إنشاء gradle.properties إذا لم يكن موجوداً
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          
          # التأكد من صلاحية التنفيذ
          chmod +x gradlew
          
          # البناء
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: landscape-design-debug-apk
          path: "**/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
