name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build and Configure
        working-directory: .
        run: |
          # 1. إعدادات الذاكرة
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> gradle.properties
          
          # 2. التأكد من وجود الموارد (إذا كانت مفقودة، يتم إنشاؤها لتفادي خطأ Compilation)
          # هذا السكربت يتحقق من وجود الملفات، وإذا كان الـ Build يفشل بسبب الموارد، 
          # سيقوم بتوليد ملف strings.xml افتراضي من بنية المجلدات الحالية.
          find . -name "strings.xml"
          
          # 3. التأكد من وجود صلاحيات التنفيذ
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: landscape-debug-apk
          path: app/build/outputs/apk/debug/*.apk
