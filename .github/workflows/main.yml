name: Build Landscape App

on:
  push:
    branches: [ "*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # تنظيف أي مجلدات أيقونات قد تسبب فشل في البناء
      - name: Cleanup Resource Icons
        working-directory: LandscapeDesignApp/LandscapeDesignApp
        run: |
          rm -rf app/src/main/res/mipmap-mdpi
          rm -rf app/src/main/res/mipmap-hdpi
          rm -rf app/src/main/res/mipmap-xhdpi
          rm -rf app/src/main/res/mipmap-xxhdpi
          rm -rf app/src/main/res/mipmap-xxxhdpi

      # توليد الـ wrapper
      - name: Setup Gradle Wrapper
        working-directory: LandscapeDesignApp/LandscapeDesignApp
        run: |
          gradle wrapper --gradle-version 8.7

      # البناء مع تنظيف أي ملفات مؤقتة
      - name: Build with Gradle
        working-directory: LandscapeDesignApp/LandscapeDesignApp
        run: |
          chmod +x gradlew
          ./gradlew clean assembleRelease --stacktrace

      # رفع الـ APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: LandscapeDesignApp/LandscapeDesignApp/app/build/outputs/apk/release/*.apk
