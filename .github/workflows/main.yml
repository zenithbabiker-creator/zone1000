- name: Configure Gradle and Fix Project
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          # 1. إعدادات الذاكرة وتفعيل AndroidX
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          # 2. إنشاء ملف الموارد بشكل صحيح وتغطية كافة الموارد المفقودة
          mkdir -p app/src/main/res/values
          cat <<EOF > app/src/main/res/values/strings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">LandscapeDesign</string>
              <string name="ar_not_supported">AR not supported</string>
              <string name="area_label">Area</string>
              <string name="border_large">Large</string>
              <string name="border_medium">Medium</string>
              <string name="border_small">Small</string>
              <string name="border_plant_suggestion_large">Large Plant Suggestion</string>
              <string name="border_plant_suggestion_medium">Medium Plant Suggestion</string>
              <string name="border_plant_suggestion_small">Small Plant Suggestion</string>
              <string name="border_summary_planted">Planted Summary</string>
              <string name="border_summary_structural">Structural Summary</string>
              <string name="borders_section_title">Borders</string>
              <string name="btn_back">Back</string>
              <string name="btn_cancel">Cancel</string>
              <string name="btn_capture">Capture</string>
              <string name="btn_clear_points">Clear</string>
              <string name="btn_confirm_area">Confirm Area</string>
              <string name="btn_copy_report">Copy Report</string>
              <string name="btn_live_reset">Reset</string>
              <string name="btn_next_step">Next</string>
              <string name="btn_ok">OK</string>
              <string name="btn_save_design">Save Design</string>
              <string name="btn_save_generate">Save & Generate</string>
              <string name="density_per_meter_label">Density/m</string>
              <string name="design_saved_toast">Saved!</string>
              <string name="lawn_density_label">Lawn Density</string>
              <string name="mode_live">Live</string>
              <string name="mode_photo">Photo</string>
              <string name="net_lawn_area_label">Net Area</string>
              <string name="plane_locked_hint">Plane Locked</string>
              <string name="plant_duranta">Duranta</string>
              <string name="plant_menu_title">Plants</string>
              <string name="plant_name_field_hint">Plant Name</string>
              <string name="plant_no_thorn">No Thorn</string>
              <string name="plant_royal_palm">Royal Palm</string>
              <string name="radius_dialog_title">Radius</string>
              <string name="radius_input_label">Enter Radius</string>
              <string name="redo">Redo</string>
              <string name="reference_area_label">Reference Area</string>
              <string name="report_copied_toast">Report Copied</string>
              <string name="scanning_hint">Scanning...</string>
              <string name="soil_volume_label">Soil Volume</string>
              <string name="step1_title">Step 1</string>
              <string name="step2_title">Step 2</string>
              <string name="step3_title">Step 3</string>
              <string name="step4_title">Step 4</string>
              <string name="step5_title">Step 5</string>
              <string name="structural_border_flag">Structural</string>
              <string name="summary_plants_added">Plants Added</string>
              <string name="thickness_dropdown_label">Thickness</string>
              <string name="tool_arc">Arc</string>
              <string name="tool_circle">Circle</string>
              <string name="tool_eraser">Eraser</string>
              <string name="tool_polygon">Polygon</string>
              <string name="total_lawn_plants_label">Total Plants</string>
              <string name="trees_per_meter_label">Trees/m</string>
              <string name="undo">Undo</string>
          </resources>
          EOF
          
          # 3. تعديل Manifest
          MANIFEST_PATH=$(find . -name "AndroidManifest.xml" | grep "/main/")
          sed -i 's|android:name="com.google.ar.core"|android:name="com.google.ar.core" tools:replace="android:value"|g' "$MANIFEST_PATH"
          sed -i 's|<manifest|<manifest xmlns:tools="http://schemas.android.com/tools"|' "$MANIFEST_PATH"
