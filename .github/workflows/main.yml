name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build Project
        run: |
          # العثور على المجلد الذي يحتوي على build.gradle
          PROJECT_ROOT=$(find . -name "build.gradle*" -exec dirname {} \; | head -n 1)
          cd "$PROJECT_ROOT"
          
          # 1. إعدادات الذاكرة وتفعيل الـ Jetifier والـ AndroidX
          # هذه الخطوة هي الأهم لحل مشكلة AndroidXDisabledJetifierDisabled
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # 2. إنشاء Wrapper إذا كان مفقوداً
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 8.7
            chmod +x gradlew
          fi
          
          # 3. البناء
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: landscape-debug-apk
          path: "**/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
