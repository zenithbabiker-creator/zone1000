name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Find Gradle project root
        id: find_root
        run: |
          ROOT_DIR=$(find . -maxdepth 3 -name "build.gradle*" -exec dirname {} \;)
          echo "PROJECT_PATH=$ROOT_DIR" >> $GITHUB_ENV

      - name: Generate Gradle Wrapper (If missing)
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 8.7
            chmod +x gradlew
          fi

      - name: Configure Gradle and Fix Project
        working-directory: ${{ env.PROJECT_PATH }}
        run: |
          # 1. إعدادات الذاكرة وتفعيل AndroidX والتحويل التلقائي للمكتبات
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          # 2. إنشاء ملف الموارد المفقود
          mkdir -p app/src/main/res/values
          cat <<EOF > app/src/main/res/values/strings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">LandscapeDesign</string>
              <string name="activity_context_error">Error</string>
          </resources>
          EOF
          
          # 3. تعديل Manifest لإضافة أدوات التصحيح وتغيير الأيقونات لتجنب الأخطاء
          MANIFEST_PATH=$(find . -name "AndroidManifest.xml" | grep "/main/")
          sed -i 's|android:name="com.google.ar.core"|android:name="com.google.ar.core" tools:replace="android:value"|g' "$MANIFEST_PATH"
          sed -i 's|<manifest|<manifest xmlns:tools="http://schemas.android.com/tools"|' "$MANIFEST_PATH"
          sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@android:drawable/sym_def_app_icon"|g' "$MANIFEST_PATH"
          sed -i 's|android:roundIcon="@mipmap/ic_launcher_round"|android:roundIcon="@android:drawable/sym_def_app_icon"|g' "$MANIFEST_PATH"

      - name: Build debug APK
        working-directory: ${{ env.PROJECT_PATH }}
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: landscape-design-debug-apk
          path: ${{ env.PROJECT_PATH }}/**/build/outputs/apk/debug/*.apk
          if-no-files-found: error
