name: Build Landscape App

on:
  push:
    branches: [ "*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # نقوم بتوليد الـ wrapper في المجلد الصحيح أولاً
      - name: Setup Gradle Wrapper
        working-directory: LandscapeDesignApp/LandscapeDesignApp
        run: |
          gradle wrapper --gradle-version 8.7

      # الآن بعد أن أصبح gradlew موجوداً، نقوم بالبناء
      - name: Build with Gradle
        working-directory: LandscapeDesignApp/LandscapeDesignApp
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      # رفع ملف الـ APK الناتج
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: LandscapeDesignApp/LandscapeDesignApp/app/build/outputs/apk/release/*.apk
