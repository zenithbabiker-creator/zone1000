name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Configure Environment and Build
        run: |
          # 1. الانتقال المباشر إلى جذر مشروع الأندرويد الفعلي
          cd LandscapeDesignApp
          
          # 2. إنشاء إعدادات المشروع الافتراضية مع دعم AndroidX والذاكرة المطلوبة للـ Core/SceneView
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=false" >> gradle.properties

          # 3. توليد ملف الـ Wrapper بالنسخة 8.7 المطابقة لمتطلبات مشروعك تماماً
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
          
          # 4. تنفيذ أمر البناء النظيف وحقن أدوات المعالجة
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: landscape-design-debug-apk
          path: LandscapeDesignApp/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
