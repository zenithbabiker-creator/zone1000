name: Full Build Landscape App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # إضافة خطوة لاكتشاف مكان مشروع الـ Gradle الفعلي
      - name: Find Gradle Project Root
        run: |
          echo "Scanning for build.gradle files..."
          find . -name "build.gradle*"
      
      # نستخدم 'working-directory' إذا كان الكود في مجلد فرعي
      # إذا كان الكود في الجذر، هذه الخطوة ستمر بسلام
      - name: Build with Gradle
        run: |
          if [ -f "build.gradle.kts" ] || [ -f "build.gradle" ]; then
            chmod +x gradlew || gradle wrapper --gradle-version 8.7
            ./gradlew assembleRelease
          else
            echo "Gradle project files not found in root. Checking subdirectories..."
            # هنا سنحاول البحث عن المجلد الذي يحتوي على ملف الإعدادات
            SUB_DIR=$(find . -maxdepth 2 -name "settings.gradle*" -exec dirname {} \;)
            if [ -n "$SUB_DIR" ]; then
              cd "$SUB_DIR"
              chmod +x gradlew || gradle wrapper --gradle-version 8.7
              ./gradlew assembleRelease
            else
              echo "Error: No Gradle project found anywhere!"
              exit 1
            fi
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          # تحديث المسار ليكون ديناميكياً بناءً على مكان البناء
          path: '**/build/outputs/apk/release/*.apk'
