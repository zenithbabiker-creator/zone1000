name: Build Landscape App

on:
  push:
    branches: [ "*" ]
    
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: LandscapeDesignApp/LandscapeDesignApp

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # هنا نقوم بـ "حقن" ملف gradlew إذا لم يكن موجوداً
      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      # التأكد من صحة الموارد قبل البناء (لم يتم تغيير أي شيء هنا)
      - name: Prepare Resource Directories
        run: |
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

      # تم التعديل إلى assembleDebug لإنتاج ملف قابل للتثبيت مباشرة
      - name: Build with Gradle
        run: ./gradlew clean assembleDebug --no-build-cache --stacktrace

      # تم تحديث اسم الـ Artifact ليعبر عن النسخة التجريبية
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: '**/build/outputs/apk/**/*.apk'
