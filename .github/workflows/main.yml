name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  GRADLE_VERSION: "8.7"

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Gradle ${{ env.GRADLE_VERSION }}
        run: |
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O /tmp/gradle.zip
          sudo unzip -q -d /opt/gradle /tmp/gradle.zip
          echo "/opt/gradle/gradle-${GRADLE_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Find Gradle project root
        id: find_root
        run: |
          ROOT_DIR=$(find . -maxdepth 3 -name "settings.gradle*" -exec dirname {} \;)
          echo "PROJECT_PATH=$ROOT_DIR" >> $GITHUB_ENV

      - name: Configure Gradle and Fix Manifests
        run: |
          # 1. إعدادات الذاكرة وتفعيل AndroidX
          PROPERTIES_FILE="${{ env.PROJECT_PATH }}/gradle.properties"
          echo "android.useAndroidX=true" >> "$PROPERTIES_FILE"
          echo "android.enableJetifier=true" >> "$PROPERTIES_FILE"
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> "$PROPERTIES_FILE"

          # 2. البحث عن ملف المانيفست
          MANIFEST_PATH=$(find ${{ env.PROJECT_PATH }} -name "AndroidManifest.xml" | grep "/main/")
          
          # 3. حل تعارض Manifest Merger
          sed -i 's|android:name="com.google.ar.core"|android:name="com.google.ar.core" tools:replace="android:value"|g' "$MANIFEST_PATH"
          sed -i 's|<manifest|<manifest xmlns:tools="http://schemas.android.com/tools"|' "$MANIFEST_PATH"
          
          # 4. حل مشكلة فقدان الأيقونات (الترقيع)
          sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@android:drawable/sym_def_app_icon"|g' "$MANIFEST_PATH"
          sed -i 's|android:roundIcon="@mipmap/ic_launcher_round"|android:roundIcon="@android:drawable/sym_def_app_icon"|g' "$MANIFEST_PATH"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build debug APK
        working-directory: ${{ env.PROJECT_PATH }}
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: landscape-design-debug-apk
          path: ${{ env.PROJECT_PATH }}/**/build/outputs/apk/debug/*.apk
          if-no-files-found: error
