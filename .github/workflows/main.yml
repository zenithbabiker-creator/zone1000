name: Build Landscape App

on:
  push:
    branches: [ "*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # إضافة الكاش لحل أخطاء التحميل والتزامن
          cache: gradle

      # بدلاً من حذف المجلدات الذي يكسر التطبيق، نقوم بضمان وجود مجلدات صالحة
      - name: Prepare Resource Directories
        working-directory: LandscapeDesignApp/LandscapeDesignApp
        run: |
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

      # التأكد من صلاحيات التنفيذ قبل أي عملية
      - name: Grant Execute Permission
        working-directory: LandscapeDesignApp/LandscapeDesignApp
        run: chmod +x gradlew

      # البناء مع استخدام flag --no-daemon لتجنب مشاكل الذاكرة في الـ Actions
      - name: Build with Gradle
        working-directory: LandscapeDesignApp/LandscapeDesignApp
        run: ./gradlew clean assembleRelease --no-daemon --stacktrace

      # رفع الـ APK الناتج
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: LandscapeDesignApp/LandscapeDesignApp/app/build/outputs/apk/release/*.apk
