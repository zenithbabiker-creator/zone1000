name: Full Build Landscape App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. تثبيت Gradle وتوليد الـ Wrapper إذا كان مفقوداً
      - name: Setup Gradle
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      # 2. إنشاء أيقونات افتراضية إذا كانت مجلدات الموارد مفقودة
      - name: Generate Dummy Icons
        run: |
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          # إنشاء أيقونة شفافة أو ملونة كحل مؤقت لتجنب خطأ التغليف
          touch app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          touch app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      # 3. بناء التطبيق
      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
