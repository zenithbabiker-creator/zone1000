name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Prepare Gradle Wrapper
        run: |
          # العثور على المجلد الذي يحتوي على build.gradle (مجلد المشروع الرئيسي)
          PROJECT_ROOT=$(find . -name "build.gradle*" -exec dirname {} \; | head -n 1)
          cd "$PROJECT_ROOT"
          
          # إنشاء ملفات Gradle Wrapper إذا لم تكن موجودة
          gradle wrapper --gradle-version 8.7
          
          # إعطاء صلاحيات التنفيذ
          chmod +x gradlew
          
          # إعدادات الذاكرة
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> gradle.properties
          
          # البناء
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: landscape-debug-apk
          path: "**/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
