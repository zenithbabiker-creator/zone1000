name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  GRADLE_VERSION: "8.7"
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Gradle ${{ env.GRADLE_VERSION }}
        run: |
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O /tmp/gradle.zip
          mkdir -p $HOME/gradle
          unzip -q -d $HOME/gradle /tmp/gradle.zip
          echo "$HOME/gradle/gradle-${GRADLE_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Verify Gradle installation
        run: gradle --version

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: Find APK Path
        run: find . -name "*.apk"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: landscape-design-debug-apk
          # استخدام النجمة المزدوجة يضمن البحث في أي مجلد فرعي
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
